name: quality

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install Python test dependency
        run: python3 -m pip install markdown-it-py

      - name: Install stable Rust toolchain
        run: |
          rustup toolchain install stable --component rustfmt --component clippy
          rustup default stable

      - name: Check formatting
        run: cargo fmt --check

      - name: Run Rust tests
        run: cargo test --package mdtools

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features

      - name: Build release binary
        run: cargo build --release

      - name: Run Python unit tests
        run: python3 -m unittest discover -s bench -p 'test_*.py'

      - name: Run benchmark harness smoke test
        run: python3 bench/harness.py --md-binary target/release/md

      - name: Record hosted run URL
        if: ${{ always() }}
        run: |
          echo "Hosted quality run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" >> "$GITHUB_STEP_SUMMARY"

  # Producer-side consumer canary for the binary-owned contract (ADR 0003):
  # this repo OWNS the contract; before a change merges, prove the current
  # pi-mdtools adapter's parity suite still passes against THIS ref's md binary.
  # Catches contract drift (schema/capability/envelope/etag) at the boundary
  # rather than after a release. pi-rov is public, so no token is needed.
  pi-mdtools-consumer-canary:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out mdtools (this ref)
        uses: actions/checkout@v7

      - name: Install stable Rust toolchain
        run: |
          rustup toolchain install stable
          rustup default stable

      - name: Build md from this ref
        run: cargo build --release

      - name: Check out pi-rov (pi-mdtools consumer)
        uses: actions/checkout@v7
        with:
          repository: pro-vi/pi-rov
          ref: main
          path: pi-rov

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install pi-rov workspace
        working-directory: pi-rov
        run: npm install

      - name: Run pi-mdtools parity against this ref's md
        working-directory: pi-rov/packages/pi-mdtools
        run: MD_BINARY="$GITHUB_WORKSPACE/target/release/md" npm test
